plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id "org.jetbrains.kotlin.plugin.serialization"
    id "org.jetbrains.compose"
    id "io.realm.kotlin"
    id "com.google.devtools.ksp" version "1.9.22-1.0.18"
//    id "de.jensklingenberg.ktorfit"
}
apply plugin: "de.jensklingenberg.ktorfit"

android {
    compileSdk 34
    lintOptions {
        warningsAsErrors true
        abortOnError true
        disable 'MissingTranslation',
                'ExtraTranslation',
                'TypographyEllipsis',
                'UnspecifiedImmutableFlag',
                'UnusedResources',
                'TypographyDashes'
    }
    buildFeatures {
        viewBinding true
        buildConfig true
        compose true
    }
    namespace 'rooit.me.xo'
    defaultConfig {
        applicationId "rooit.me.xo"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
        buildConfigField("String", "BASE_URL", "\"https://newsapi.org/\"")
        buildConfigField("String", "API_KEY", "\"f53a2c1085bd4e19859f4f3b07f2babf\"")
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        debug {
            matchingFallbacks = ['release', 'debug']
            minifyEnabled false
            shrinkResources false
            debuggable true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-system-common.pro', 'proguard-third-party.pro', 'proguard-module.pro'
        }
        release {
            matchingFallbacks = ['release', 'debug']
            minifyEnabled false
            shrinkResources false
            debuggable false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8.toString()
    }

    composeOptions {
        kotlinCompilerExtensionVersion libs.versions.android.compose.compiler.get()
    }

    flavorDimensions "product_code"
    productFlavors {
        legacy_nav {
            getIsDefault().set(true)
            dimension "product_code"
            dependencies {
                implementation libs.androidx.activity.ktx
                implementation libs.androidx.fragment.ktx
                implementation libs.androidx.appcompat
                implementation libs.material
                implementation libs.androidx.constraintlayout
                implementation libs.androidx.lifecycle.livedata.ktx
                implementation libs.androidx.lifecycle.viewmodel.ktx
                implementation libs.androidx.navigation.fragment.ktx
                implementation libs.androidx.navigation.ui.ktx
                implementation libs.splashscreen
                implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.2.0-alpha01"

//              Ref : https://medium.com/@jonathan.mercandalli_41381/move-from-kapt-to-ksp-in-glide-on-android-dc786cab2584
                implementation libs.glide
                ksp libs.glide.ksp
            }
        }
        kmp {
            dimension "product_code"
            dependencies {
                implementation libs.androidx.lifecycle.runtime.ktx
                implementation libs.androidx.activity.compose
                implementation libs.androidx.ui
                implementation libs.androidx.ui.tooling.preview
                implementation libs.androidx.compose.foundation
                implementation libs.androidx.lifecycle.runtime.compose
                implementation libs.androidx.navigation.compose

                implementation libs.imageLoader

                androidTestImplementation platform(libs.androidx.compose.bom)
                debugImplementation libs.androidx.ui.compose.test.junit4
                debugImplementation libs.androidx.ui.compose.test.manifest
            }
        }
    }

    sourceSets {
        main {
            java.srcDirs = ['src/main/java']
            res.srcDirs = ['src/main/res']
        }
        legacy_nav {
            java.srcDirs = ['src/legacy_nav/java']
            res.srcDirs = ['src/legacy_nav/res']
            manifest.srcFile 'src/legacy_nav/AndroidManifest.xml'
        }
        kmp {
            java.srcDirs = ['src/kmp/java']
            res.srcDirs = ['src/kmp/res']
            manifest.srcFile 'src/kmp/AndroidManifest.xml'
        }
    }
}

dependencies {
    implementation libs.kotlinx.serialization
    implementation libs.kotlinx.serialization.json
    implementation libs.kotlinx.coroutines
    implementation libs.koin.core
    implementation libs.koin.android
    implementation  libs.timber

    implementation libs.androidx.core.ktx

    implementation platform(libs.androidx.compose.bom)
    implementation libs.androidx.ui.graphics
    implementation libs.androidx.compose.material3


    implementation libs.ktor.core
    implementation libs.ktor.android
    implementation libs.ktor.negotiation
    implementation libs.ktor.serialization
    implementation libs.ktor.serialization.json

    implementation libs.de.ktorfit
    ksp libs.de.ktorfit.ksp

    implementation  libs.realm.kotlin.base
//    implementation libs.realm.kotlin.sync

    testImplementation libs.junit
    androidTestImplementation libs.androidx.junit
    androidTestImplementation libs.androidx.espresso.core
}